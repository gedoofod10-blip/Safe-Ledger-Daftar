name: Build Android APK (Daftar App) - Final Auto Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        # تم استخدام npm install لتجاوز مشكلة عدم توافق ملف lock المرفوع
        run: npm install

      - name: Build Web App (Vite)
        # بناء ملفات الويب أولاً لإنشاء مجلد dist
        run: npm run build

      - name: Setup Capacitor and Android Platform
        run: |
          # تثبيت أدوات Capacitor اللازمة للتحويل في السحابة
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # إنشاء ملف إعدادات Capacitor متوافق مع Vite (webDir: 'dist')
          echo "import { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.daftar.app',
            appName: 'Daftar App',
            webDir: 'dist',
            server: {
              androidScheme: 'https'
            }
          };
          export default config;" > capacitor.config.ts

          # إضافة منصة أندرويد للمشروع (هذه الخطوة تنشئ مجلد android)
          npx cap add android

          # تجهيز الأيقونات وشاشات التوقف من ملفات PWA الخاصة بك
          mkdir -p assets
          if [ -f "public/pwa-512x512.png" ]; then
            cp public/pwa-512x512.png assets/icon-only.png
            cp public/pwa-512x512.png assets/icon.png
            cp public/pwa-512x512.png assets/splash.png
            cp public/pwa-512x512.png assets/splash-dark.png
            # توليد موارد الأندرويد تلقائياً لتجنب أخطاء الأيقونات المفقودة
            npx capacitor-assets generate --android
          fi

          # مزامنة ملفات الويب مع مشروع الأندرويد
          npx cap sync android

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android APK (Gradle)
        run: |
          # الدخول لمجلد الأندرويد الذي تم إنشاؤه بواسطة Capacitor
          cd android
          # إعطاء صلاحية التشغيل لـ gradlew
          chmod +x gradlew
          # تشغيل عملية البناء النهائية للـ APK
          ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Daftar-App-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
