name: Build Android APK (Daftar App) - New Workflow

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Capacitor and Resources
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
          # التأكد من وجود ملف capacitor.config.ts
          if [ ! -f "capacitor.config.ts" ]; then
            echo "capacitor.config.ts not found! Creating a default one."
            echo "import { CapacitorConfig } from '@capacitor/cli';\n\nconst config: CapacitorConfig = {\n  appId: 'com.daftar.app',\n  appName: 'Daftar App',\n  webDir: 'dist',\n  server: {\n    androidScheme: 'https'\n  }\n};\n\nexport default config;" > capacitor.config.ts
          fi

          # إضافة منصة أندرويد إذا لم تكن موجودة
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          # تجهيز الأيقونات وشاشات التوقف
          mkdir -p assets
          # استخدام الأيقونات الموجودة في public/pwa-512x512.png
          cp public/pwa-512x512.png assets/icon-only.png
          cp public/pwa-512x512.png assets/icon.png
          cp public/pwa-512x512.png assets/splash.png
          cp public/pwa-512x512.png assets/splash-dark.png
          
          # توليد موارد الأندرويد (الأيقونات وشاشات التوقف) تلقائياً
          npx capacitor-assets generate --android

          # مزامنة المشروع
          npx cap sync android

      - name: Setup Java for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Daftar-App-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
