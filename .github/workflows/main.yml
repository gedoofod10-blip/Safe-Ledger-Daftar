name: Build Android APK

# متى يتم تشغيل هذا البناء؟
on:
  push:
    branches: [ "main", "master" ] # عند رفع أي كود لفرع main أو master
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest # استخدام خادم بنظام أوبونتو

    steps:
    # 1. سحب الكود الخاص بك من المستودع
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. إعداد بيئة الجافا (إصدار 17 هو الشائع حالياً، يمكنك تغييره حسب مشروعك)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. إعطاء صلاحية التشغيل لأداة Gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. بناء ملف الـ APK (نسخة التطوير Debug)
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. رفع ملف الـ APK الناتج لكي تتمكن من تحميله
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
